name: Runtime Image CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/runtime-image.yml
      - Dockerfile.runtime
      - scripts/**/requirements.txt
      - scripts/**/main.py
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL (GitHub Advanced Security)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  test-image:
    name: Build and Script Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          load: true
          push: false
          tags: prefect-demo-runtime:test

      - name: Smoke test scripts in container
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm -v "$PWD:/workspace" -w /workspace prefect-demo-runtime:test python scripts/01-my-flow/main.py
          docker run --rm -v "$PWD:/workspace" -w /workspace prefect-demo-runtime:test python scripts/02-prepare-data/main.py
          docker run --rm -v "$PWD:/workspace" -w /workspace prefect-demo-runtime:test python scripts/03-transform-data/main.py
          docker run --rm -v "$PWD:/workspace" -w /workspace prefect-demo-runtime:test python scripts/04-publish-summary/main.py

          if docker run --rm -v "$PWD:/workspace" -w /workspace prefect-demo-runtime:test python scripts/05-fail-demo/main.py; then
            echo "05-fail-demo unexpectedly succeeded"
            exit 1
          else
            echo "05-fail-demo failed as expected"
          fi

  publish-image:
    name: Publish GHCR Image
    runs-on: ubuntu-latest
    needs:
      - codeql
      - test-image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/prefect-demo-runtime
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}